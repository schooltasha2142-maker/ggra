<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ Безпечний Пароль — Гра для 8 класу</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');

:root {
  --bg-primary: #0a0e27;
  --bg-secondary: #111638;
  --accent-blue: #00d4ff;
  --accent-purple: #a855f7;
  --accent-green: #22c55e;
  --accent-red: #ef4444;
  --accent-yellow: #facc15;
  --accent-pink: #f472b6;
  --card-bg: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.1);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background */
.bg-animation {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.bg-animation .circle {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  animation: floatBg 20s infinite ease-in-out;
}
.bg-animation .circle:nth-child(1) {
  width: 500px; height: 500px;
  background: var(--accent-blue);
  top: -100px; left: -100px;
  animation-delay: 0s;
}
.bg-animation .circle:nth-child(2) {
  width: 400px; height: 400px;
  background: var(--accent-purple);
  bottom: -100px; right: -100px;
  animation-delay: -7s;
}
.bg-animation .circle:nth-child(3) {
  width: 300px; height: 300px;
  background: var(--accent-green);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -14s;
}

@keyframes floatBg {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(50px, -30px) scale(1.1); }
  50% { transform: translate(-20px, 50px) scale(0.9); }
  75% { transform: translate(30px, 20px) scale(1.05); }
}

/* Grid pattern overlay */
.grid-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
  pointer-events: none;
}

/* Main container */
.container {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;}

/* Header */
.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  backdrop-filter: blur(20px);
  margin-bottom: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 1.1em;
}

.logo-icon {
  font-size: 1.8em;
}

.header-stats {
  display: flex;
  gap: 15px;
  align-items: center;
}

.stat-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.85em;
}

.stat-badge .icon { font-size: 1.1em; }

.progress-bar-container {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.1);  border-radius: 2px;
  margin-top: 8px;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* Screens */
.screen {
  display: none;
  animation: fadeSlideIn 0.5s ease;
  flex: 1;
}

.screen.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Cards */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 20px;
  backdrop-filter: blur(20px);
  transition: all 0.3s ease;
}

.card:hover {
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

/* Typography */
h1 {
  font-size: 2em;
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 15px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;  -webkit-text-fill-color: transparent;
  background-clip: text;
}

h2 {
  font-size: 1.5em;
  font-weight: 800;
  margin-bottom: 15px;
}

.subtitle {
  color: var(--text-secondary);
  font-size: 1em;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 28px;
  border: none;
  border-radius: 14px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1em;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  color: white;
  box-shadow: 0 4px 20px rgba(0,212,255,0.3);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,212,255,0.4);
}

.btn-success {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  box-shadow: 0 4px 20px rgba(34,197,94,0.3);
}
.btn-danger {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  box-shadow: 0 4px 20px rgba(239,68,68,0.3);
}

.btn-outline {
  background: transparent;
  border: 2px solid var(--accent-blue);
  color: var(--accent-blue);
}

.btn-outline:hover {
  background: var(--accent-blue);
  color: var(--bg-primary);
}

.btn-lg {
  padding: 18px 36px;
  font-size: 1.15em;
  border-radius: 18px;
}

.btn:active { transform: scale(0.97); }

/* Level indicators */
.level-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.8em;
  font-weight: 700;
  margin-bottom: 15px;
}

.level-badge.l1 { background: rgba(0,212,255,0.15); color: var(--accent-blue); border: 1px solid rgba(0,212,255,0.3); }
.level-badge.l2 { background: rgba(168,85,247,0.15); color: var(--accent-purple); border: 1px solid rgba(168,85,247,0.3); }
.level-badge.l3 { background: rgba(34,197,94,0.15); color: var(--accent-green); border: 1px solid rgba(34,197,94,0.3); }
.level-badge.final { background: rgba(250,204,21,0.15); color: var(--accent-yellow); border: 1px solid rgba(250,204,21,0.3); }

/* Character */
.character-container {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}
.character {
  width: 70px;
  height: 70px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2em;
  background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(168,85,247,0.2));
  border: 2px solid rgba(0,212,255,0.3);
  flex-shrink: 0;
  animation: bounce 3s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.character-speech {
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 15px 20px;
  font-size: 0.9em;
  line-height: 1.6;
  position: relative;
}

.character-speech::before {
  content: '';
  position: absolute;
  left: -10px;
  top: 50%;
  transform: translateY(-50%);
  width: 0; height: 0;
  border: 10px solid transparent;
  border-right-color: rgba(255,255,255,0.08);
}

/* Question cards */
.question-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 15px;
  backdrop-filter: blur(20px);
}
.password-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.6em;
  font-weight: 700;
  padding: 15px 25px;
  background: rgba(0,0,0,0.4);
  border: 2px dashed rgba(255,255,255,0.15);
  border-radius: 12px;
  text-align: center;
  margin: 15px 0;
  letter-spacing: 2px;
  color: var(--accent-yellow);
  word-break: break-all;
}

/* Answer buttons */
.answer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 15px;
}

.answer-btn {
  padding: 14px 20px;
  border: 2px solid var(--card-border);
  border-radius: 14px;
  background: var(--card-bg);
  color: var(--text-primary);
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1em;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.answer-btn:hover:not(.disabled) {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.answer-btn.correct {
  background: rgba(34,197,94,0.2);
  border-color: var(--accent-green);
  color: var(--accent-green);}

.answer-btn.wrong {
  background: rgba(239,68,68,0.2);
  border-color: var(--accent-red);
  color: var(--accent-red);
}

.answer-btn.disabled {
  cursor: default;
  opacity: 0.5;
}

/* Feedback */
.feedback {
  margin-top: 15px;
  padding: 15px 20px;
  border-radius: 14px;
  font-size: 0.9em;
  line-height: 1.6;
  animation: fadeSlideIn 0.4s ease;
}

.feedback.success {
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.3);
  color: var(--accent-green);
}

.feedback.error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  color: var(--accent-red);
}

.feedback .feedback-icon {
  font-size: 1.2em;
  margin-right: 6px;
}

/* Password strength meter */
.strength-meter {
  margin: 20px 0;
}

.strength-bar-bg {
  height: 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  overflow: hidden;}

.strength-bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: all 0.5s ease;
  width: 0%;
}

.strength-label {
  text-align: center;
  font-weight: 700;
  margin-top: 8px;
  font-size: 0.95em;
}

.strength-criteria {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 15px;
}

.criteria-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  font-size: 0.85em;
  transition: all 0.3s ease;
}

.criteria-item.met {
  background: rgba(34,197,94,0.1);
  color: var(--accent-green);
}

.criteria-item.unmet {
  color: var(--text-secondary);
}

/* Password builder elements */
.element-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 15px 0;
}
.element-chip {
  padding: 8px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95em;
  cursor: pointer;
  transition: all 0.3s ease;
  user-select: none;
}

.element-chip:hover {
  background: rgba(0,212,255,0.15);
  border-color: var(--accent-blue);
  transform: scale(1.05);
}

.element-chip.selected {
  background: rgba(0,212,255,0.2);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
}

.password-input-area {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4em;
  padding: 15px 20px;
  background: rgba(0,0,0,0.4);
  border: 2px solid var(--card-border);
  border-radius: 14px;
  color: var(--accent-blue);
  width: 100%;
  outline: none;
  text-align: center;
  transition: border-color 0.3s ease;
}

.password-input-area:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 20px rgba(0,212,255,0.2);
}

/* Scenario card */
.scenario-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 25px;  margin-bottom: 15px;
}

.scenario-icon {
  font-size: 3em;
  margin-bottom: 10px;
}

.scenario-text {
  font-size: 1em;
  line-height: 1.7;
  margin-bottom: 20px;
}

.scenario-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.scenario-option {
  padding: 14px 18px;
  background: var(--card-bg);
  border: 2px solid var(--card-border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.95em;
  color: var(--text-primary);
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}

.scenario-option:hover:not(.disabled) {
  border-color: var(--accent-blue);
  background: rgba(0,212,255,0.08);
}

.scenario-option.correct {
  border-color: var(--accent-green);
  background: rgba(34,197,94,0.15);
}

.scenario-option.wrong {
  border-color: var(--accent-red);
  background: rgba(239,68,68,0.15);
}
.scenario-option.disabled { cursor: default; opacity: 0.5; }

.scenario-option .option-letter {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.85em;
  background: rgba(255,255,255,0.1);
  flex-shrink: 0;
}

/* Certificate */
.certificate {
  background: linear-gradient(135deg, #1a1f4e, #0a0e27);
  border: 2px solid var(--accent-yellow);
  border-radius: 20px;
  padding: 40px 30px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.certificate::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(250,204,21,0.1), transparent, rgba(168,85,247,0.1), transparent);
  animation: rotateBg 15s linear infinite;
}

@keyframes rotateBg {
  to { transform: rotate(360deg); }
}

.certificate-content {
  position: relative;
  z-index: 1;
}

.certificate h2 {
  font-size: 1.8em;
  color: var(--accent-yellow);  margin-bottom: 10px;
}

.certificate .cert-icon {
  font-size: 4em;
  margin-bottom: 15px;
}

.cert-name {
  font-size: 1.3em;
  font-weight: 800;
  color: var(--accent-blue);
  margin: 10px 0;
}

.cert-score {
  font-size: 1em;
  color: var(--text-secondary);
  margin-top: 10px;
}

.cert-badge {
  display: inline-block;
  padding: 8px 20px;
  background: linear-gradient(135deg, var(--accent-yellow), #f59e0b);
  color: var(--bg-primary);
  border-radius: 12px;
  font-weight: 800;
  font-size: 0.9em;
  margin-top: 15px;
}

/* Points animation */
.points-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2em;
  font-weight: 900;
  color: var(--accent-green);
  pointer-events: none;
  z-index: 100;
  animation: pointsFloat 1.5s ease forwards;
}

@keyframes pointsFloat {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
  50% { opacity: 1; transform: translate(-50%, -80%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -120%) scale(0.8); }}

/* Shake animation */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.shake { animation: shake 0.5s ease; }

/* Confetti */
.confetti-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 200;
  overflow: hidden;
}

.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: confettiFall 3s ease-in forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Responsive */
@media (max-width: 600px) {
  h1 { font-size: 1.5em; }
  h2 { font-size: 1.2em; }
  .card { padding: 20px; }
  .password-display { font-size: 1.2em; padding: 12px 15px; }
  .answer-grid { grid-template-columns: 1fr; }
  .strength-criteria { grid-template-columns: 1fr; }
  .game-header { flex-wrap: wrap; gap: 10px; }
  .header-stats { gap: 8px; }
  .stat-badge { font-size: 0.75em; padding: 4px 8px; }
  .btn { padding: 12px 20px; font-size: 0.9em; }
  .btn-lg { padding: 14px 24px; font-size: 1em; }
  .character-container { flex-direction: column; text-align: center; }
  .character-speech::before { display: none; }
  .certificate { padding: 25px 15px; }
  .scenario-icon { font-size: 2.5em; }}

/* Navigation */
.nav-buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}

/* Question counter */
.question-counter {
  text-align: center;
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 0.9em;
  margin-bottom: 15px;
}

/* Tips list */
.tips-list {
  list-style: none;
  margin: 15px 0;
}

.tips-list li {
  padding: 10px 15px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.95em;
  line-height: 1.5;
}

.tips-list li .tip-icon {
  font-size: 1.2em;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Score summary */
.score-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 20px 0;}

.score-item {
  text-align: center;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
}

.score-item .score-value {
  font-size: 2em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.score-item .score-label {
  font-size: 0.8em;
  color: var(--text-secondary);
  margin-top: 4px;
}

@media (max-width: 600px) {
  .score-summary { grid-template-columns: 1fr; }
}

/* Tooltip */
.info-tip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--accent-blue);
  font-size: 0.85em;
  font-weight: 600;
  cursor: help;
}

.hidden { display: none !important; }

/* Timer animation */
.timer-display {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
}

/* Level transition */
.level-transition {
  text-align: center;  padding: 40px 20px;
}

.level-number {
  font-size: 5em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.level-title {
  font-size: 1.5em;
  font-weight: 800;
  margin-top: 10px;
}

/* Password generator */
.gen-btn-group {
  display: flex;
  gap: 8px;
  margin: 15px 0;
  flex-wrap: wrap;
  justify-content: center;
}

.gen-btn {
  padding: 10px 18px;
  border: 2px solid var(--card-border);
  border-radius: 10px;
  background: var(--card-bg);
  color: var(--text-primary);
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 0.9em;
  cursor: pointer;
  transition: all 0.3s ease;
}

.gen-btn:hover, .gen-btn.active {
  border-color: var(--accent-blue);
  background: rgba(0,212,255,0.1);
}
</style>
</head>
<body>
